[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "algo-x402"
version = "0.1.0"
description = "Python SDK for x402 AI-to-AI payments on Algorand"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["algorand", "x402", "usdc", "payments", "ai-agent"]
dependencies = [
    "py-algorand-sdk>=2.0,<3.0",
    "requests>=2.28",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio", "responses"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"
